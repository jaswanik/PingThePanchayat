<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | PingThePanchayat</title>
    <meta name="description" content="Reset your PingThePanchayat account password using OTP or security question.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-card { width: 100%; max-width: 480px; }
        .auth-logo { text-align: center; margin-bottom: 2rem; }
        .auth-logo .logo { justify-content: center; font-size: 1.75rem; }
        .auth-logo p { color: var(--text-gray); margin-top: 0.5rem; font-size: 0.9rem; }
        .back-home { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-gray); text-decoration: none; font-size: 0.85rem; margin-bottom: 2rem; transition: color 0.2s; }
        .back-home:hover { color: white; }
        .input-group { position: relative; }
        .input-group .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-gray); font-size: 0.9rem; pointer-events: none; }
        .input-group input, .input-group select { padding-left: 2.75rem; }
        .input-group .toggle-pw { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-gray); cursor: pointer; }
        .method-tabs { display: flex; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 0.75rem; padding: 3px; margin-bottom: 2rem; }
        .method-tab { flex: 1; padding: 0.65rem; text-align: center; font-size: 0.875rem; font-weight: 600; color: var(--text-gray); cursor: pointer; border-radius: 0.6rem; transition: all 0.2s; border: none; background: none; }
        .method-tab.active { background: var(--primary); color: white; }
        .step-panel { display: none; }
        .step-panel.active { display: block; }
        .info-box { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); border-radius: 0.75rem; padding: 0.9rem 1rem; margin-bottom: 1.5rem; font-size: 0.83rem; color: var(--text-gray); }
        .info-box i { color: var(--primary); margin-right: 0.4rem; }
        .otp-inputs { display: flex; gap: 0.5rem; justify-content: center; margin: 1rem 0; }
        .otp-input { width: 50px; height: 56px; text-align: center; font-size: 1.5rem; font-weight: 700; border-radius: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; outline: none; transition: border-color 0.2s; }
        .otp-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }
        .success-screen { text-align: center; padding: 2rem 0; }
        .success-screen i { font-size: 4rem; color: var(--accent); margin-bottom: 1rem; }
        .success-screen h3 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .success-screen p { color: var(--text-gray); }
        #toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.75rem; }
        .toast-item { display: flex; align-items: center; gap: 0.75rem; background: rgba(15,23,42,0.95); border: 1px solid var(--glass-border); border-radius: 0.75rem; padding: 1rem 1.25rem; min-width: 280px; max-width: 360px; backdrop-filter: blur(20px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); animation: slideInRight 0.3s ease; }
        .toast-item.success { border-left: 4px solid var(--accent); }
        .toast-item.error { border-left: 4px solid var(--danger); }
        .toast-item.info { border-left: 4px solid var(--primary); }
        .toast-icon { font-size: 1.1rem; }
        .toast-item.success .toast-icon { color: var(--accent); }
        .toast-item.error .toast-icon { color: var(--danger); }
        .toast-item.info .toast-icon { color: var(--primary); }
        .toast-msg { font-size: 0.875rem; flex: 1; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .btn-loading { opacity: 0.7; pointer-events: none; }
        .spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        select option { background: #0f172a; color: white; }
        .simulated-otp-box { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 0.75rem; padding: 1rem; margin: 1rem 0; font-family: monospace; font-size: 1.1rem; text-align: center; color: var(--accent); display: none; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a href="login.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Login</a>
            <div class="glass-card">
                <div class="auth-logo">
                    <div class="logo"><i class="fas fa-satellite-dish"></i> <span>Ping</span>ThePanchayat</div>
                    <p>Account Recovery</p>
                </div>
                <h2 style="font-size:1.5rem; font-weight:800; margin-bottom:0.5rem;"><i class="fas fa-unlock-alt" style="color:var(--primary);"></i> Reset Password</h2>
                <p style="color:var(--text-gray); font-size:0.9rem; margin-bottom:1.75rem;">Choose how you'd like to recover your account</p>

                <!-- Method Toggle -->
                <div class="method-tabs">
                    <button class="method-tab active" id="tab-otp" onclick="switchMethod('otp')">
                        <i class="fas fa-mobile-alt"></i> OTP (Simulated)
                    </button>
                    <button class="method-tab" id="tab-question" onclick="switchMethod('question')">
                        <i class="fas fa-shield-alt"></i> Security Question
                    </button>
                </div>

                <!-- OTP Method -->
                <div id="panel-otp" class="step-panel active">
                    <!-- Step 1: Email -->
                    <div id="otp-step1">
                        <div class="info-box"><i class="fas fa-info-circle"></i> A 6-digit OTP will be sent to your registered mobile number (simulated for demo).</div>
                        <div class="form-group">
                            <label for="otp-email">Registered Email Address</label>
                            <div class="input-group">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" id="otp-email" placeholder="you@example.com" required>
                            </div>
                        </div>
                        <button class="btn btn-primary" style="width:100%; padding:0.9rem;" onclick="sendOtp()" id="sendOtpBtn">
                            <i class="fas fa-paper-plane"></i> Send OTP
                        </button>
                    </div>
                    <!-- Step 2: OTP + New Password -->
                    <div id="otp-step2" style="display:none;">
                        <div class="simulated-otp-box" id="simulatedOtpBox"></div>
                        <div class="form-group">
                            <label>Enter 6-Digit OTP</label>
                            <div class="otp-inputs">
                                <input type="text" class="otp-input" maxlength="1" id="o1" oninput="otpNav(this,'','o2')">
                                <input type="text" class="otp-input" maxlength="1" id="o2" oninput="otpNav(this,'o1','o3')">
                                <input type="text" class="otp-input" maxlength="1" id="o3" oninput="otpNav(this,'o2','o4')">
                                <input type="text" class="otp-input" maxlength="1" id="o4" oninput="otpNav(this,'o3','o5')">
                                <input type="text" class="otp-input" maxlength="1" id="o5" oninput="otpNav(this,'o4','o6')">
                                <input type="text" class="otp-input" maxlength="1" id="o6" oninput="otpNav(this,'o5','')">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="otp-new-pw">New Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="otp-new-pw" placeholder="Min. 8 characters" required>
                                <button type="button" class="toggle-pw" onclick="togglePwField('otp-new-pw','eyeOtp')"><i class="fas fa-eye" id="eyeOtp"></i></button>
                            </div>
                        </div>
                        <button class="btn btn-primary" style="width:100%; padding:0.9rem;" onclick="resetByOtp()" id="resetOtpBtn">
                            <i class="fas fa-key"></i> Reset Password
                        </button>
                        <button class="btn btn-secondary" style="width:100%; margin-top:0.75rem;" onclick="goBackOtp()">
                            <i class="fas fa-arrow-left"></i> Try Different Email
                        </button>
                    </div>
                </div>

                <!-- Security Question Method -->
                <div id="panel-question" class="step-panel">
                    <!-- Step 1: Email Lookup -->
                    <div id="q-step1">
                        <div class="form-group">
                            <label for="q-email">Registered Email Address</label>
                            <div class="input-group">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" id="q-email" placeholder="you@example.com" required>
                            </div>
                        </div>
                        <button class="btn btn-primary" style="width:100%; padding:0.9rem;" onclick="lookupQuestion()" id="lookupBtn">
                            <i class="fas fa-search"></i> Find My Account
                        </button>
                    </div>
                    <!-- Step 2: Answer Question + New Password -->
                    <div id="q-step2" style="display:none;">
                        <div class="info-box" id="questionDisplay"><i class="fas fa-question-circle"></i> <span id="questionText"></span></div>
                        <div class="form-group">
                            <label for="q-answer">Your Answer</label>
                            <div class="input-group">
                                <i class="fas fa-key input-icon"></i>
                                <input type="text" id="q-answer" placeholder="Your secret answer" required autocomplete="off">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="q-new-pw">New Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="q-new-pw" placeholder="Min. 8 characters" required>
                                <button type="button" class="toggle-pw" onclick="togglePwField('q-new-pw','eyeQ')"><i class="fas fa-eye" id="eyeQ"></i></button>
                            </div>
                        </div>
                        <button class="btn btn-primary" style="width:100%; padding:0.9rem;" onclick="resetByQuestion()" id="resetQBtn">
                            <i class="fas fa-key"></i> Reset Password
                        </button>
                        <button class="btn btn-secondary" style="width:100%; margin-top:0.75rem;" onclick="goBackQ()">
                            <i class="fas fa-arrow-left"></i> Try Different Email
                        </button>
                    </div>
                </div>

                <!-- Success Screen -->
                <div id="successPanel" style="display:none;">
                    <div class="success-screen">
                        <i class="fas fa-check-circle"></i>
                        <h3>Password Reset!</h3>
                        <p>Your password has been updated successfully.</p>
                        <a href="login.html" class="btn btn-primary" style="margin-top:2rem; padding:0.9rem 2rem;" id="go-login-btn">
                            <i class="fas fa-sign-in-alt"></i> Go to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <script src="utils.js"></script>
    <script>
        let currentEmail = '';

        function showToast(msg, type = 'info') {
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
            const t = document.getElementById('toast');
            const el = document.createElement('div');
            el.className = `toast-item ${type}`;
            el.innerHTML = `<i class="fas ${icons[type]} toast-icon"></i><span class="toast-msg">${msg}</span>`;
            t.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }

        function switchMethod(method) {
            document.getElementById('tab-otp').classList.toggle('active', method === 'otp');
            document.getElementById('tab-question').classList.toggle('active', method === 'question');
            document.getElementById('panel-otp').classList.toggle('active', method === 'otp');
            document.getElementById('panel-question').classList.toggle('active', method === 'question');
        }

        function togglePwField(id, iconId) {
            const el = document.getElementById(id);
            const icon = document.getElementById(iconId);
            el.type = el.type === 'password' ? 'text' : 'password';
            icon.className = el.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }

        function otpNav(el, prevId, nextId) {
            if (el.value && nextId) document.getElementById(nextId).focus();
            if (!el.value && prevId) document.getElementById(prevId).focus();
        }

        function getOtpValue() {
            return ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id).value).join('');
        }

        // OTP Flow
        async function sendOtp() {
            const email = document.getElementById('otp-email').value.trim();
            if (!email) { showToast('Please enter your email address.', 'error'); return; }
            const btn = document.getElementById('sendOtpBtn');
            btn.classList.add('btn-loading');
            btn.innerHTML = '<span class="spinner"></span> Sending...';
            try {
                const res = await Utils.post('/auth/recover-otp', { email });
                if (res.status === 'success') {
                    currentEmail = email;
                    document.getElementById('otp-step1').style.display = 'none';
                    document.getElementById('otp-step2').style.display = 'block';
                    if (res.simulated_otp) {
                        const box = document.getElementById('simulatedOtpBox');
                        box.style.display = 'block';
                        box.innerHTML = `<i class="fas fa-mobile-alt"></i> Simulated OTP: <strong>${res.simulated_otp}</strong>`;
                    }
                    showToast('OTP sent! (Check simulated OTP above)', 'success');
                } else {
                    showToast(res.message || 'Failed to send OTP.', 'error');
                }
            } catch { showToast('Server error. Please try again.', 'error'); }
            btn.classList.remove('btn-loading');
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
        }

        async function resetByOtp() {
            const otp = getOtpValue();
            const new_password = document.getElementById('otp-new-pw').value;
            if (otp.length !== 6) { showToast('Please enter the complete 6-digit OTP.', 'error'); return; }
            if (new_password.length < 8) { showToast('Password must be at least 8 characters.', 'error'); return; }
            const btn = document.getElementById('resetOtpBtn');
            btn.classList.add('btn-loading');
            btn.innerHTML = '<span class="spinner"></span> Resetting...';
            try {
                const res = await Utils.post('/auth/reset-password-otp', { email: currentEmail, otp, new_password });
                if (res.status === 'success') {
                    showSuccess();
                } else {
                    showToast(res.message || 'Invalid OTP. Please try again.', 'error');
                }
            } catch { showToast('Server error. Please try again.', 'error'); }
            btn.classList.remove('btn-loading');
            btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
        }

        function goBackOtp() {
            document.getElementById('otp-step2').style.display = 'none';
            document.getElementById('otp-step1').style.display = 'block';
            document.getElementById('simulatedOtpBox').style.display = 'none';
        }

        // Security Question Flow
        async function lookupQuestion() {
            const email = document.getElementById('q-email').value.trim();
            if (!email) { showToast('Please enter your email address.', 'error'); return; }
            const btn = document.getElementById('lookupBtn');
            btn.classList.add('btn-loading');
            btn.innerHTML = '<span class="spinner"></span> Looking up...';
            try {
                const res = await Utils.get(`/auth/recover-question?email=${encodeURIComponent(email)}`);
                if (res.status === 'success') {
                    currentEmail = email;
                    document.getElementById('questionText').textContent = res.question;
                    document.getElementById('q-step1').style.display = 'none';
                    document.getElementById('q-step2').style.display = 'block';
                } else {
                    showToast(res.message || 'Account not found.', 'error');
                }
            } catch { showToast('Server error. Please try again.', 'error'); }
            btn.classList.remove('btn-loading');
            btn.innerHTML = '<i class="fas fa-search"></i> Find My Account';
        }

        async function resetByQuestion() {
            const answer = document.getElementById('q-answer').value.trim();
            const new_password = document.getElementById('q-new-pw').value;
            if (!answer) { showToast('Please enter your security answer.', 'error'); return; }
            if (new_password.length < 8) { showToast('Password must be at least 8 characters.', 'error'); return; }
            const btn = document.getElementById('resetQBtn');
            btn.classList.add('btn-loading');
            btn.innerHTML = '<span class="spinner"></span> Resetting...';
            try {
                const res = await Utils.post('/auth/reset-password', { email: currentEmail, answer, new_password });
                if (res.status === 'success') {
                    showSuccess();
                } else {
                    showToast(res.message || 'Incorrect answer. Please try again.', 'error');
                }
            } catch { showToast('Server error. Please try again.', 'error'); }
            btn.classList.remove('btn-loading');
            btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
        }

        function goBackQ() {
            document.getElementById('q-step2').style.display = 'none';
            document.getElementById('q-step1').style.display = 'block';
        }

        function showSuccess() {
            document.getElementById('panel-otp').style.display = 'none';
            document.getElementById('panel-question').style.display = 'none';
            document.querySelector('.method-tabs').style.display = 'none';
            document.getElementById('successPanel').style.display = 'block';
            showToast('Password reset successfully!', 'success');
        }
    </script>
</body>
</html>
